# Netlify Configuration
# This file configures automatic builds and deployments

[build]
  # Build command
  command = "pnpm build"
  
  # Directory to deploy (after build)
  publish = "dist/public"
  
  # Functions directory (if using serverless functions)
  functions = "functions"

[build.environment]
  # Node version
  NODE_VERSION = "22"
  
  # pnpm version
  PNPM_VERSION = "10"

# Redirect all non-file requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Custom error page (optional)
# [context.production]
#   command = "pnpm build"
#   publish = "dist/public"

# Preview deployments
[context.deploy-preview]
  command = "pnpm build"
  publish = "dist/public"

# Branch deployments
[context.branch-deploy]
  command = "pnpm build"
  publish = "dist/public"
